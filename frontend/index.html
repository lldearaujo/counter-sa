<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyCount — Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="header">
    <h1>EasyCount</h1>
    <nav class="header-nav">
      <a href="/" class="nav-link active">Dashboard</a>
      <a href="/config" class="nav-link">Configurar</a>
    </nav>
    <div class="header-status">
      <span id="ws-indicator" class="dot offline"></span>
      <span id="ws-label">Desconectado</span>
    </div>
  </header>

  <main id="streams-grid" class="grid">
    <div class="empty-state" id="empty-state">Aguardando streams...</div>
  </main>

  <!-- Modal de relatório por stream -->
  <div id="report-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-stream-name">—</h2>
        <div class="modal-header-actions">
          <button id="btn-export" class="btn-sm btn-secondary">⬇ Exportar CSV</button>
          <button id="btn-modal-close" class="btn-sm btn-ghost">✕ Fechar</button>
        </div>
      </div>

      <!-- Filtro de data -->
      <div class="filter-row">
        <label>De <input type="datetime-local" id="filter-from" /></label>
        <label>Até <input type="datetime-local" id="filter-to" /></label>
        <select id="filter-class">
          <option value="">Todos os tipos</option>
          <option value="pedestrian">Pedestre</option>
          <option value="car">Carro</option>
          <option value="motorcycle">Moto</option>
          <option value="bus">Ônibus</option>
          <option value="truck">Caminhão</option>
          <option value="bicycle">Bicicleta</option>
        </select>
        <button id="btn-filter" class="btn-sm btn-primary">Filtrar</button>
      </div>

      <!-- Totais por tipo -->
      <div class="report-totals" id="report-totals"></div>

      <!-- Gráfico de barras por hora -->
      <div class="chart-wrap">
        <canvas id="report-chart" height="120"></canvas>
      </div>

      <!-- Tabela de eventos -->
      <div class="report-table-wrap">
        <table class="report-table">
          <thead>
            <tr>
              <th>Data / Hora</th>
              <th>Tipo</th>
              <th>Zona</th>
              <th>Direção</th>
            </tr>
          </thead>
          <tbody id="report-tbody"></tbody>
        </table>
        <div id="report-empty" class="report-empty hidden">Nenhum evento encontrado.</div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
